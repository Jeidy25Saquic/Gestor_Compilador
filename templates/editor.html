<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowForge | Editor DSL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0B0E14;
            color: #E8EDF2;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background: #131722;
            border-bottom: 1px solid #202534;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.3rem;
        }
        .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #2D8C7C, #1C5C52);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .run-btn {
            background: #2D8C7C;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .run-btn:hover { background: #1C5C52; transform: scale(0.98); }
        .auto-compile {
            background: #1E2432;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 40px;
            color: #E8EDF2;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 0.75rem;
        }
        .auto-compile.active { background: #2D8C7C; }
        .editor-container {
            flex: 1;
            padding: 1.5rem;
        }
        .CodeMirror {
            height: 100%;
            border-radius: 16px;
            font-size: 14px;
        }
        .message-area {
            padding: 0.8rem 2rem;
            background: #131722;
            border-top: 1px solid #202534;
            font-size: 0.9rem;
        }
        .error { color: #E06C75; }
        .success { color: #98C379; }
        a { color: #2D8C7C; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="navbar">
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-pen-nib"></i></div>
        <span>FlowForge · Editor DSL</span>
    </div>
    <div style="display: flex; gap: 0.75rem;">
        <button id="autoCompileBtn" class="auto-compile"><i class="fas fa-sync-alt"></i> Auto-compilar</button>
        <button id="runBtn" class="run-btn"><i class="fas fa-play"></i> Ejecutar y desplegar</button>
    </div>
</div>
<div class="editor-container">
    <textarea id="codeEditor">
// === Ejemplo de proyecto ===
REG.USR("juan", "Juan Pérez", ROL.COORD);
REG.USR("maria", "Maria López", ROL.MIEM);
ING.USR("juan");

CRE.TAR("Implementar login", PRI.ALT, FEC(HOY+2 DIAS), DES("Autenticación con JWT"), ASIG.USR("juan"));
CRE.TAR("Diseñar base de datos", PRI.URG, FEC(HOY+1 SEMANA), ASIG.USR("maria"));
ASIG.TAR("Implementar login", ASIG.USR("maria"));
ETIQ.TAR("Implementar login", AGREGAR("backend", "seguridad"));

CRE.GRP("backend", ASIG.USR("juan"));
DIV.TAR("Implementar login", CRE.SUBTAR("frontend-login"), CRE.SUBTAR("api-auth"));

CRE.LIS(LIS.TIT("Tareas críticas"), LIS.DESC("Lista de tareas urgentes"));
AG.LIS("Tareas críticas", EN.LIS("Implementar login"));

CAM.EST("Implementar login", EST.ACT);
CAM.PRI("Diseñar base de datos", PRI.ALT);
    </textarea>
</div>
<div id="message" class="message-area"></div>

<script>
    const editor = CodeMirror.fromTextArea(document.getElementById('codeEditor'), {
        lineNumbers: true,
        mode: "javascript",
        theme: "material-darker",
        indentUnit: 4,
        tabSize: 4
    });

    let autoCompile = false;
    let compileTimeout = null;
    const autoCompileBtn = document.getElementById('autoCompileBtn');
    const runBtn = document.getElementById('runBtn');
    const msgDiv = document.getElementById('message');

    async function compilarTiempoReal() {
        const codigo = editor.getValue();
        try {
            const res = await fetch('/api/compilar/tiempo-real', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ codigo })
            });
            const data = await res.json();
            if (data.ok) {
                msgDiv.innerHTML = '<span class="success"><i class="fas fa-check-circle"></i> Compilación exitosa</span>';
            } else {
                msgDiv.innerHTML = `<span class="error"><i class="fas fa-exclamation-triangle"></i> ${data.error}</span>`;
                if (data.linea) {
                    const lineNum = parseInt(data.linea) - 1;
                    if (!isNaN(lineNum) && lineNum >= 0) {
                        editor.addLineClass(lineNum, 'background', 'cm-error-line');
                        setTimeout(() => editor.removeLineClass(lineNum, 'background', 'cm-error-line'), 2000);
                    }
                }
            }
        } catch (err) {
            msgDiv.innerHTML = `<span class="error"><i class="fas fa-bug"></i> Error de conexión: ${err.message}</span>`;
        }
    }

    function handleCodeChange() {
        if (autoCompile) {
            if (compileTimeout) clearTimeout(compileTimeout);
            compileTimeout = setTimeout(() => compilarTiempoReal(), 800);
        }
    }

    editor.on('change', handleCodeChange);

    async function ejecutar() {
        const codigo = editor.getValue();
        runBtn.disabled = true;
        runBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Ejecutando...';
        msgDiv.innerHTML = '';

        try {
            const res = await fetch('/api/ejecutar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ codigo })
            });
            const data = await res.json();
            if (data.ok) {
                msgDiv.innerHTML = '<span class="success"><i class="fas fa-check-circle"></i> Código válido. Abriendo dashboard...</span>';
                window.open('/', '_blank');
            } else {
                msgDiv.innerHTML = `<span class="error"><i class="fas fa-exclamation-triangle"></i> Error: ${data.error}</span>`;
            }
        } catch (err) {
            msgDiv.innerHTML = `<span class="error"><i class="fas fa-bug"></i> Conexión fallida: ${err.message}</span>`;
        } finally {
            runBtn.disabled = false;
            runBtn.innerHTML = '<i class="fas fa-play"></i> Ejecutar y desplegar';
        }
    }

    autoCompileBtn.addEventListener('click', () => {
        autoCompile = !autoCompile;
        if (autoCompile) {
            autoCompileBtn.classList.add('active');
            autoCompileBtn.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i> Auto-compilando...';
            compilarTiempoReal();
        } else {
            autoCompileBtn.classList.remove('active');
            autoCompileBtn.innerHTML = '<i class="fas fa-sync-alt"></i> Auto-compilar';
        }
    });

    runBtn.addEventListener('click', ejecutar);

    const style = document.createElement('style');
    style.textContent = '.cm-error-line { background-color: rgba(224, 108, 117, 0.2); }';
    document.head.appendChild(style);
</script>
</body>
</html>
