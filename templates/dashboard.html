<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gestor de Proyectos DSL</title>
    <!-- Tailwind CSS + Plugins -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- SortableJS para drag & drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Flatpickr para calendario -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Transiciones y estilos personalizados */
        .task-card {
            transition: all 0.2s ease;
            cursor: grab;
        }
        .task-card:active {
            cursor: grabbing;
        }
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .kanban-col {
            background: #f9fafb;
            border-radius: 1rem;
            min-height: 400px;
        }
        .dark .kanban-col {
            background: #1f2937;
        }
        .transition-smooth {
            transition: all 0.3s ease;
        }
        .tab-active {
            border-bottom: 2px solid #3b82f6;
            color: #3b82f6;
        }
        /* Scroll suave */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body x-data="app()" x-init="init()" :class="darkMode ? 'dark' : ''" class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300">
    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <!-- Cabecera -->
        <div class="flex flex-wrap justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-4xl font-extrabold text-gray-800 dark:text-white flex items-center gap-3">
                    <i class="fas fa-tasks text-blue-500"></i>
                    Gestor DSL
                </h1>
                <p class="text-gray-500 dark:text-gray-400 mt-1">Panel de control del proyecto</p>
            </div>
            <div class="flex gap-3">
                <button @click="toggleDarkMode" class="px-4 py-2 rounded-lg bg-white dark:bg-gray-800 shadow-md hover:shadow-lg transition">
                    <i class="fas" :class="darkMode ? 'fa-sun' : 'fa-moon'"></i>
                    <span x-text="darkMode ? 'Modo claro' : 'Modo oscuro'"></span>
                </button>
                <button @click="refreshData" class="px-4 py-2 rounded-lg bg-blue-500 text-white shadow-md hover:bg-blue-600 transition">
                    <i class="fas fa-sync-alt"></i> Recargar
                </button>
            </div>
        </div>

        <!-- Pestañas principales -->
        <div class="flex flex-wrap gap-2 border-b border-gray-200 dark:border-gray-700 mb-6">
            <button @click="activeTab = 'kanban'" :class="{'tab-active': activeTab === 'kanban'}" class="px-5 py-2 font-medium rounded-t-lg transition">📌 Kanban</button>
            <button @click="activeTab = 'lista'" :class="{'tab-active': activeTab === 'lista'}" class="px-5 py-2 font-medium rounded-t-lg transition">📋 Lista</button>
            <button @click="activeTab = 'calendario'" :class="{'tab-active': activeTab === 'calendario'}" class="px-5 py-2 font-medium rounded-t-lg transition">📅 Calendario</button>
            <button @click="activeTab = 'graficos'" :class="{'tab-active': activeTab === 'graficos'}" class="px-5 py-2 font-medium rounded-t-lg transition">📊 Gráficos</button>
            <button @click="activeTab = 'usuarios'" :class="{'tab-active': activeTab === 'usuarios'}" class="px-5 py-2 font-medium rounded-t-lg transition">👥 Usuarios</button>
        </div>

        <!-- Contenido de pestañas -->
        <div x-show="activeTab === 'kanban'" x-transition.opacity.duration.300ms>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-5" id="kanban-board">
                <!-- Se llena dinámicamente -->
            </div>
        </div>

        <div x-show="activeTab === 'lista'" x-transition.opacity.duration.300ms>
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-5">
                <div class="flex flex-wrap gap-4 mb-4 justify-between items-center">
                    <input type="text" placeholder="Buscar tarea..." x-model="filtroLista" class="px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600 w-64">
                    <select x-model="filtroPrioridad" class="px-3 py-2 border rounded-lg dark:bg-gray-700">
                        <option value="">Todas las prioridades</option>
                        <option value="PRI.URG">Urgente</option>
                        <option value="PRI.ALT">Alta</option>
                        <option value="PRI.MED">Media</option>
                        <option value="PRI.BAJ">Baja</option>
                    </select>
                    <select x-model="filtroEstado" class="px-3 py-2 border rounded-lg dark:bg-gray-700">
                        <option value="">Todos los estados</option>
                        <option value="EST.PEN">Pendiente</option>
                        <option value="EST.ACT">Activa</option>
                        <option value="EST.REV">Revisión</option>
                        <option value="EST.FIN">Finalizada</option>
                    </select>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                        <thead>
                            <tr>
                                <th class="px-4 py-2 text-left">Nombre</th>
                                <th class="px-4 py-2 text-left">Estado</th>
                                <th class="px-4 py-2 text-left">Prioridad</th>
                                <th class="px-4 py-2 text-left">Fecha límite</th>
                                <th class="px-4 py-2 text-left">Asignado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="tarea in tareasFiltradas" :key="tarea.nombre">
                                <tr class="border-b dark:border-gray-700">
                                    <td class="px-4 py-2 font-medium" x-text="tarea.nombre"></td>
                                    <td class="px-4 py-2"><span x-text="tarea.estado" class="px-2 py-1 rounded-full text-xs" :class="{'bg-yellow-100 text-yellow-800': tarea.estado === 'EST.PEN', 'bg-blue-100 text-blue-800': tarea.estado === 'EST.ACT', 'bg-purple-100 text-purple-800': tarea.estado === 'EST.REV', 'bg-green-100 text-green-800': tarea.estado === 'EST.FIN'}"></span></td>
                                    <td class="px-4 py-2" x-text="tarea.prioridad"></td>
                                    <td class="px-4 py-2" x-text="tarea.fecha_limite || '—'"></td>
                                    <td class="px-4 py-2" x-text="tarea.asignado_a || '—'"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div x-show="activeTab === 'calendario'" x-transition.opacity.duration.300ms>
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-5">
                <div id="calendario"></div>
            </div>
        </div>

        <div x-show="activeTab === 'graficos'" x-transition.opacity.duration.300ms>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-5">
                    <h3 class="text-xl font-bold mb-3">Progreso del proyecto</h3>
                    <canvas id="progressChart" width="400" height="400"></canvas>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-5">
                    <h3 class="text-xl font-bold mb-3">Distribución por prioridad</h3>
                    <canvas id="priorityChart" width="400" height="400"></canvas>
                </div>
            </div>
        </div>

        <div x-show="activeTab === 'usuarios'" x-transition.opacity.duration.300ms>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-5">
                    <h3 class="text-xl font-bold mb-3">Usuarios registrados</h3>
                    <ul>
                        <template x-for="u in usuarios" :key="u.nombre">
                            <li class="flex justify-between py-2 border-b dark:border-gray-700">
                                <span><i class="fas fa-user-circle"></i> <span x-text="u.nombre"></span></span>
                                <span class="text-sm" :class="{'text-green-500': u.sesion === 'activa', 'text-gray-500': u.sesion !== 'activa'}">
                                    <i class="fas" :class="u.sesion === 'activa' ? 'fa-circle' : 'fa-circle'"></i>
                                    <span x-text="u.sesion === 'activa' ? 'Activo' : 'Inactivo'"></span>
                                </span>
                            </li>
                        </template>
                    </ul>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-5">
                    <h3 class="text-xl font-bold mb-3">Grupos</h3>
                    <template x-for="g in grupos" :key="g.nombre">
                        <div class="mb-3 p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
                            <div class="font-bold" x-text="g.nombre"></div>
                            <div class="text-sm text-gray-600 dark:text-gray-300">Miembros: <span x-text="g.miembros.join(', ') || 'Ninguno'"></span></div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <script>
        function app() {
            return {
                activeTab: 'kanban',
                darkMode: false,
                tareas: [],
                usuarios: [],
                grupos: [],
                listas: [],
                vistas: [],
                stats: {},
                filtroLista: '',
                filtroPrioridad: '',
                filtroEstado: '',
                progressChart: null,
                priorityChart: null,
                calendar: null,
                async init() {
                    await this.fetchData();
                    this.$watch('activeTab', (value) => {
                        if (value === 'graficos') this.renderCharts();
                        if (value === 'calendario') this.initCalendar();
                    });
                },
                async fetchData() {
                    const res = await fetch('/api/datos');
                    const data = await res.json();
                    this.tareas = data.tareas;
                    this.usuarios = data.usuarios;
                    this.grupos = data.grupos;
                    this.listas = data.listas;
                    this.vistas = data.vistas;
                    this.stats = data.stats;
                    this.renderKanban();
                    this.initSortable();
                    if (this.activeTab === 'graficos') this.renderCharts();
                    if (this.activeTab === 'calendario') this.initCalendar();
                },
                refreshData() {
                    this.fetchData();
                },
                renderKanban() {
                    const estadosOrden = ['EST.PEN', 'EST.ACT', 'EST.REV', 'EST.FIN'];
                    const nombresEstados = {
                        'EST.PEN': '📌 Pendiente',
                        'EST.ACT': '⚙️ En curso',
                        'EST.REV': '🔍 Revisión',
                        'EST.FIN': '✅ Finalizada'
                    };
                    let boardHtml = '';
                    for (let est of estadosOrden) {
                        const tareasFilt = this.tareas.filter(t => t.estado === est);
                        boardHtml += `
                            <div class="kanban-col p-3" data-status="${est}">
                                <h3 class="font-bold text-lg mb-3 flex justify-between">
                                    ${nombresEstados[est]}
                                    <span class="text-sm bg-gray-200 dark:bg-gray-600 rounded-full px-2">${tareasFilt.length}</span>
                                </h3>
                                <div class="space-y-2" id="col-${est}">
                                    ${tareasFilt.map(t => `
                                        <div class="task-card bg-white dark:bg-gray-800 p-3 rounded-lg shadow cursor-move" data-id="${t.nombre}" data-estado="${t.estado}">
                                            <div class="font-semibold">${this.escapeHtml(t.nombre)}</div>
                                            <div class="text-sm text-gray-500">${t.prioridad || 'Sin prioridad'} | ${t.asignado_a || 'Sin asignar'}</div>
                                            <div class="text-xs">📅 ${t.fecha_limite || 'Sin fecha'}</div>
                                            ${t.etiquetas.length ? `<div class="flex flex-wrap gap-1 mt-2"><span class="text-xs bg-gray-200 dark:bg-gray-700 rounded px-1">${t.etiquetas.join('</span><span class="text-xs bg-gray-200 dark:bg-gray-700 rounded px-1">')}</span></div>` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }
                    document.getElementById('kanban-board').innerHTML = boardHtml;
                    this.initSortable();
                },
                initSortable() {
                    const cols = document.querySelectorAll('.kanban-col > div');
                    cols.forEach(col => {
                        new Sortable(col, {
                            group: 'shared',
                            animation: 200,
                            onEnd: (evt) => {
                                const nuevaColumna = evt.to.parentElement.getAttribute('data-status');
                                const tareaId = evt.item.getAttribute('data-id');
                                // Actualizar estado en el frontend (no persiste, pero se ve bien)
                                const tarea = this.tareas.find(t => t.nombre === tareaId);
                                if (tarea) {
                                    tarea.estado = nuevaColumna;
                                    // Opcional: mostrar un pequeño toast
                                    console.log(`Tarea ${tareaId} movida a ${nuevaColumna}`);
                                }
                                this.renderKanban(); // re-render para mantener sincronía
                            }
                        });
                    });
                },
                renderCharts() {
                    const ctxProgress = document.getElementById('progressChart').getContext('2d');
                    if (this.progressChart) this.progressChart.destroy();
                    this.progressChart = new Chart(ctxProgress, {
                        type: 'doughnut',
                        data: {
                            labels: ['Completadas', 'Pendientes'],
                            datasets: [{
                                data: [this.stats.completadas, this.stats.pendientes],
                                backgroundColor: ['#10b981', '#f59e0b'],
                                borderWidth: 0
                            }]
                        },
                        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
                    });
                    const ctxPriority = document.getElementById('priorityChart').getContext('2d');
                    if (this.priorityChart) this.priorityChart.destroy();
                    this.priorityChart = new Chart(ctxPriority, {
                        type: 'bar',
                        data: {
                            labels: ['Urgente', 'Alta', 'Media', 'Baja'],
                            datasets: [{
                                label: 'Cantidad de tareas',
                                data: [this.stats.prioridades.PRI.URG, this.stats.prioridades.PRI.ALT, this.stats.prioridades.PRI.MED, this.stats.prioridades.PRI.BAJ],
                                backgroundColor: '#3b82f6'
                            }]
                        },
                        options: { responsive: true, scales: { y: { beginAtZero: true, stepSize: 1 } } }
                    });
                },
                initCalendar() {
                    if (this.calendar) this.calendar.destroy();
                    const fechas = this.tareas.filter(t => t.fecha_limite).map(t => ({ title: t.nombre, date: t.fecha_limite }));
                    this.calendar = flatpickr("#calendario", {
                        inline: true,
                        mode: "multiple",
                        dateFormat: "Y-m-d",
                        defaultDate: fechas.map(f => f.date),
                        onDayCreate: (dObj, dStr, fp, dayElem) => {
                            const dateStr = dayElem.dateObj.toISOString().slice(0,10);
                            const tareasDia = fechas.filter(f => f.date === dateStr);
                            if (tareasDia.length) {
                                dayElem.style.backgroundColor = '#3b82f6';
                                dayElem.style.color = 'white';
                                dayElem.style.borderRadius = '50%';
                                dayElem.title = tareasDia.map(t => t.title).join('\n');
                            }
                        }
                    });
                },
                toggleDarkMode() {
                    this.darkMode = !this.darkMode;
                    document.documentElement.classList.toggle('dark', this.darkMode);
                },
                escapeHtml(str) {
                    if (!str) return '';
                    return str.replace(/[&<>]/g, function(m) {
                        if (m === '&') return '&amp;';
                        if (m === '<') return '&lt;';
                        if (m === '>') return '&gt;';
                        return m;
                    });
                },
                get tareasFiltradas() {
                    return this.tareas.filter(t => {
                        const matchNombre = t.nombre.toLowerCase().includes(this.filtroLista.toLowerCase());
                        const matchPrioridad = this.filtroPrioridad === '' || t.prioridad === this.filtroPrioridad;
                        const matchEstado = this.filtroEstado === '' || t.estado === this.filtroEstado;
                        return matchNombre && matchPrioridad && matchEstado;
                    });
                }
            }
        }
    </script>
</body>
</html>
